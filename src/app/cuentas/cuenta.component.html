<div style="padding: 20px; font-family: 'Segoe UI', sans-serif;">

  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
    <h1 style="color: #333; margin: 0;">Cuentas</h1>
    <button (click)="mostrarFormulario.set(!mostrarFormulario())" 
            style="background: #ffcc00; color: #000; border: none; padding: 10px 25px; border-radius: 4px; font-weight: bold; cursor: pointer;">
      {{ mostrarFormulario() ? 'Cerrar' : 'Nueva Cuenta' }}
    </button>
  </div>

  <div *ngIf="mostrarFormulario()" style="background: #f9f9f9; padding: 20px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px;">
    <h3>{{ nuevaCuenta.id ? 'Editar Cuenta' : 'Nueva Cuenta' }}</h3>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
      <input type="number" [(ngModel)]="nuevaCuenta.numeroCuenta" placeholder="Número de Cuenta">
      <select [(ngModel)]="nuevaCuenta.tipoCuenta">
        <option value="Ahorros">Ahorros</option>
        <option value="Corriente">Corriente</option>
      </select>
      <input [(ngModel)]="nuevaCuenta.saldoInicial" type="number" placeholder="Saldo Inicial">
      <input [(ngModel)]="nuevaCuenta.cliente.id" type="number" placeholder="ID Cliente">
      <label style="display:flex; align-items:center; gap:8px;">
        <input type="checkbox" [(ngModel)]="nuevaCuenta.estado"> Activo
      </label>
    </div>
    <div style="margin-top: 15px;">
      <button (click)="guardar()" style="background: #1e7e34; color: white; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer;">
        {{ nuevaCuenta.id ? 'Actualizar' : 'Guardar' }}
      </button>
      <button (click)="cancelar()" style="margin-left: 10px; padding: 8px 16px;">Cancelar</button>
    </div>
  </div>

  <div *ngIf="mensajeExito()" style="background:#d4edda; color:#155724; padding:10px; border-radius:4px; margin-bottom:10px;">
    {{ mensajeExito() }}
  </div>

  <table style="width: 100%; border-collapse: collapse; background: white; border: 1px solid #eee;">
    <thead style="background: #fcfcfc; border-bottom: 2px solid #eee;">
      <tr>
        <th style="padding: 15px; text-align: left; color: #666;">Número Cuenta</th>
        <th style="padding: 15px; text-align: left; color: #666;">Tipo</th>
        <th style="padding: 15px; text-align: left; color: #666;">Saldo Inicial</th>
        <th style="padding: 15px; text-align: left; color: #666;">Cliente</th>
        <th style="padding: 15px; text-align: left; color: #666;">Estado</th>
        <th style="padding: 15px; text-align: center; color: #666;">Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let c of cuentas()" style="border-bottom: 1px solid #f9f9f9;">
        <td style="padding: 15px;">{{ c.numeroCuenta }}</td>
        <td style="padding: 15px;">{{ c.tipoCuenta }}</td>
        <td style="padding: 15px;">{{ c.saldoInicial }}</td>
        <td style="padding: 15px;">{{ c.cliente?.nombre }}</td>
        <td style="padding: 15px;">
          <span [style.color]="c.estado ? 'green' : 'red'">
            {{ c.estado ? 'Activo' : 'Inactivo' }}
          </span>
        </td>
        <td style="padding: 15px; text-align: center;">
          <button (click)="editar(c)" style="color: #004b81; border: none; background: none; cursor: pointer; font-weight: bold; margin-right: 10px;">Editar</button>
          <button (click)="eliminar(c.id)" style="color: #d9534f; border: none; background: none; cursor: pointer; font-weight: bold;">Eliminar</button>
        </td>
      </tr>
      <tr *ngIf="cuentas().length === 0">
        <td colspan="6" style="padding: 40px; text-align: center; color: #999;">No hay cuentas registradas.</td>
      </tr>
    </tbody>
  </table>
</div>
